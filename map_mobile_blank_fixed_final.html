<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>제주 NOWDA 공영관광지 클릭 지도</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:transparent;font-family:Arial,'Noto Sans KR',sans-serif;color:#111827;overflow:hidden;}
.nowda-wrap{width:100%;max-width:1040px;margin:0 auto;background:transparent;}
.view-tabs{display:flex;gap:6px;justify-content:center;align-items:center;padding:6px 4px 7px;background:#ffffff;flex-wrap:wrap;}
.view-tabs button{border:1.5px solid #e5e7eb;background:#f9fafb;color:#6b7280;border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;line-height:1;cursor:pointer;transition:all .15s;}
.view-tabs button.active{background:#dd6b20;color:#fff;border-color:#dd6b20;}
.view-tabs button[data-view="east"].active{background:#0a7c50;border-color:#0a7c50;}
.view-tabs button[data-view="south"].active{background:#c05c10;border-color:#c05c10;}
.view-tabs button[data-view="west"].active{background:#6d3eb5;border-color:#6d3eb5;}
.view-tabs button[data-view="city"].active{background:#1a6db5;border-color:#1a6db5;}
.map-stage{position:relative;width:100%;aspect-ratio:1270/900;border-radius:12px;overflow:hidden;background:#d7edf8;box-shadow:0 4px 14px rgba(15,23,42,.10);}
#mapSvg{position:absolute;inset:0;width:100%;height:100%;display:block;}
.hit{fill:rgba(255,255,255,0);stroke:rgba(255,255,255,0);cursor:pointer;pointer-events:all;}
.hit:focus{outline:none;}
.focus-ring{fill:none;stroke:#fff;stroke-width:7;opacity:.95;}
.focus-ring2{fill:none;stroke:#111827;stroke-width:2;opacity:.28;}
.popup-card{width:100%;height:100%;background:rgba(255,255,255,.98);border:3px solid #1f6ea8;border-radius:18px;padding:14px 13px 12px;box-shadow:0 10px 24px rgba(15,23,42,.28);font-family:Arial,'Noto Sans KR',sans-serif;line-height:1.25;}
.close{position:absolute;top:8px;right:9px;width:28px;height:28px;border-radius:50%;border:1px solid #d1d5db;background:white;color:#6b7280;font-size:22px;font-weight:900;line-height:22px;cursor:pointer;}
.title-row{display:flex;gap:10px;align-items:flex-start;padding-right:32px;margin-bottom:10px;}
.big-num{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:900;flex-shrink:0;}
.place-name{font-size:21px;font-weight:900;line-height:1.15;word-break:keep-all;}
.badge-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.badge{border-radius:999px;padding:4px 8px;font-size:12px;font-weight:900;}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 11px;}
.actions a{display:block;text-align:center;text-decoration:none;padding:10px 0;border-radius:10px;font-size:14px;font-weight:900;}
.nearby-title{font-size:14px;font-weight:900;color:#374151;margin:3px 0 7px;}
.nearby-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.nearby-item{display:flex;gap:6px;align-items:center;width:100%;padding:7px 6px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:9px;cursor:pointer;text-align:left;}
.nearby-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:900;flex-shrink:0;}
.nearby-text{font-size:12px;line-height:1.15;font-weight:900;color:#111827;white-space:normal;}
.nearby-text em{font-style:normal;color:#6b7280;font-size:10px;font-weight:800;}
@media(max-width:700px){
  .view-tabs{display:flex;}
  .nowda-wrap{max-width:none;}
  .map-stage{border-radius:10px;box-shadow:none;}
  .popup-card{border-width:2.5px;border-radius:15px;padding:12px 11px 10px;}
  .place-name{font-size:19px;}
  .big-num{width:34px;height:34px;font-size:16px;}
  .actions a{font-size:13px;padding:9px 0;}
  #slideSheet{display:block;}
  .nearby-list{grid-template-columns:1fr;}
  .nearby-item{padding:6px;}
}

#slideSheet{display:block;background:#fff;border-top:2px solid #e5e7eb;padding:14px 14px 20px;position:relative;}
.sh-close{position:absolute;top:10px;right:12px;width:28px;height:28px;border-radius:50%;border:1px solid #e5e7eb;background:#f9fafb;font-size:20px;font-weight:900;color:#6b7280;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;}
.sh-num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:900;flex-shrink:0;}
.sh-name{font-size:20px;font-weight:900;line-height:1.2;word-break:keep-all;}
.sh-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.sh-badge{border-radius:999px;padding:4px 10px;font-size:12px;font-weight:900;}
.sh-actions{display:grid;gap:8px;margin:12px 0 0;}
.sh-actions a{display:block;text-align:center;text-decoration:none;padding:13px 0;border-radius:10px;font-size:16px;font-weight:900;}

/* === iframe 공백 제거 최종: 정보카드를 아래 공간이 아니라 지도 위 하단 오버레이로 표시 === */
html,body{
  width:100%;
  height:100%;
  overflow:hidden !important;
  background:transparent;
}
.nowda-wrap{
  width:100%;
  max-width:1160px;
  height:100vh;
  margin:0 auto;
  background:transparent;
  position:relative;
  overflow:hidden;
}
.view-tabs{
  min-height:58px;
  background:#ffffff;
  position:relative;
  z-index:5;
}
.map-stage{
  height:calc(100vh - 58px) !important;
  aspect-ratio:auto !important;
  border-radius:12px;
}
#slideSheet{
  position:absolute !important;
  left:0;
  right:0;
  bottom:0;
  z-index:20;
  display:block;
  background:rgba(255,255,255,.98) !important;
  border-top:2px solid #e5e7eb;
  border-radius:18px 18px 0 0;
  padding:14px 18px 18px !important;
  box-shadow:0 -8px 24px rgba(15,23,42,.18);
  max-height:34vh;
  overflow:auto;
}
.sh-close{
  top:12px;
  right:14px;
}
.sh-name{
  font-size:22px;
  line-height:1.15;
  letter-spacing:-.04em;
}
.sh-badge{
  font-size:13px;
  padding:5px 10px;
}
.sh-actions{
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:13px;
}
.sh-actions a{
  padding:14px 0;
  font-size:17px;
  border-radius:12px;
}

/* 폰에서는 카드 높이를 더 작게 해서 공백 없이 지도 위에 뜨게 */
@media(max-width:700px){
  .nowda-wrap{
    max-width:none;
    height:100vh;
  }
  .view-tabs{
    min-height:104px;
    padding:7px 4px 8px;
  }
  .map-stage{
    height:calc(100vh - 104px) !important;
    border-radius:10px;
  }
  #slideSheet{
    left:8px;
    right:8px;
    bottom:8px;
    border:1px solid #e5e7eb;
    border-radius:16px;
    padding:12px 12px 13px !important;
    max-height:34vh;
  }
  .sh-num{
    width:40px;
    height:40px;
    font-size:19px;
  }
  .sh-name{
    font-size:21px;
    line-height:1.14;
  }
  .sh-badges{
    margin-top:5px;
  }
  .sh-badge{
    font-size:12.5px;
    padding:4px 9px;
  }
  .sh-actions{
    grid-template-columns:1fr;
    gap:8px;
    margin-top:10px;
  }
  .sh-actions a{
    padding:11px 0;
    font-size:16px;
    border-radius:11px;
  }
}

</style>
</head>

function colorOf(s){return s.type==='무료'?'#dd6b20':'#6b46c1'}
function esc(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function mapUrl(name){const q=name==='천지연폭포'?'제주 천지연폭포':name==='천제연폭포'?'제주 천제연폭포':name;return `https://map.naver.com/p/search/${encodeURIComponent(q)}`}
function findSpot(id){const hit=spots.find(s=>s.id===id); if(!hit) return null; return selectable.find(s=>s.id===(hit.selectId||hit.id)) || hit;}
function getNearby(spot){
  return selectable.filter(s=>s.id!==spot.id).map(s=>({...s,dist:Math.sqrt(Math.pow((s.x-spot.x)*0.159,2)+Math.pow((s.y-spot.y)*0.163,2))})).sort((a,b)=>a.dist-b.dist).slice(0,4);
}
function renderHits(){
  hitLayer.innerHTML=spots.map(s=>{
    const c=colorOf(s);
    const btnH=38, numW=36, charW=16.3, padding=5;
    const textW=s.name.length*charW+padding;
    const totalW=numW+textW;
    const bx=s.x-totalW/2, by=s.y-btnH/2;
    const rx=btnH/2;
    return `<g class="marker-g" data-id="${s.id}" style="cursor:pointer">
      <rect x="${bx-2}" y="${by-2}" width="${totalW+4}" height="${btnH+4}" rx="${rx+2}" fill="rgba(15,23,42,0.20)"/>
      <rect x="${bx}" y="${by}" width="${totalW}" height="${btnH}" rx="${rx}" fill="${c}"/>
      <rect x="${bx}" y="${by}" width="${numW}" height="${btnH}" rx="${rx}" fill="rgba(0,0,0,0.20)"/>
      <text x="${bx+numW/2}" y="${s.y+7.5}" text-anchor="middle" font-size="25" font-weight="800"
        fill="#ffffff" font-family="'Noto Sans KR',Arial,sans-serif" pointer-events="none">${s.num}<\/text>
      <text x="${bx+numW+3}" y="${s.y+7}" text-anchor="start" font-size="18.3" font-weight="700"
        fill="#ffffff" font-family="'Noto Sans KR',Arial,sans-serif" pointer-events="none">${esc(s.name)}<\/text>
      <title>${esc(s.name)}<\/title>
    <\/g>`;
  }).join('');
  hitLayer.querySelectorAll('.marker-g').forEach(g=>{
    g.addEventListener('click',()=>selectSpot(g.dataset.id));
  });
}
function setView(name){
  current=name;
  const r=regions[name]||regions.all;
  svg.setAttribute('viewBox', `${r.x} ${r.y} ${r.w} ${r.h}`);
  document.querySelectorAll('.view-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.view===name));
  }
function selectSpot(id){
  selected=findSpot(id);
  if(!selected) return;
  
  selectedLayer.innerHTML='<circle class="focus-ring" cx="'+selected.x+'" cy="'+selected.y+'" r="25"></circle><circle class="focus-ring2" cx="'+selected.x+'" cy="'+selected.y+'" r="28"></circle>';
  openSheet(selected);
}
function openSheet(s){
  if(!s) return;
  const c=colorOf(s), reg=regionInfo[s.region]||{color:'#374151',bg:'#f3f4f6'};
  document.getElementById('shNum').textContent=s.num;
  document.getElementById('shNum').style.background=c;
  document.getElementById('shName').textContent=s.name;
  document.getElementById('shBadges').innerHTML=
    '<span class="sh-badge" style="background:'+c+';color:#fff">'+(s.type==='무료'?'무료입장':'50% 할인')+'</span>'+
    '<span class="sh-badge" style="background:'+reg.bg+';color:'+reg.color+'">'+s.region+'</span>';
  var homeBtn=s.home?'<a href="'+s.home+'" target="_blank" style="background:#2563eb;color:#fff">홈페이지</a>':'';
  document.getElementById('shActions').innerHTML=
    '<a href="'+mapUrl(s.name)+'" target="_blank" style="background:#15803d;color:#fff">네이버 지도</a>'+homeBtn;
  document.getElementById('slideSheet').style.display='block';
}

});
